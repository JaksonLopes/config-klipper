[gcode_macro PRINT_START]
gcode:
    {% set BED_TEMP = params.BED|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|default(230)|float %}

    M117 Aquecendo...
    M140 S{BED_TEMP}
    M104 S150             # Aquecimento parcial para expansão térmica

    G90                   
    G28                   # Home inicial

    M117 Estabilizando mesa...
    M190 S{BED_TEMP}

    M117 Alinhando motores Z...
    Z_TILT_ADJUST
    G28 Z                 # Obrigatório após Z-Tilt

    # --- CALIBRAÇÃO DO Z PRIMEIRO ---
    M117 Calibrando Z...
    # CALIBRATE_Z           

    # --- CARREGAR MAPA POR ÚLTIMO ---
  
    BED_MESH_PROFILE LOAD=default
  

    M117 Aquecimento final...
    G1 X150 Y150 Z10 F6000 
    # Define a temperatura mas não trava o processamento ainda
    M104 S{EXTRUDER_TEMP}
    # Aguarda a temperatura atingir o alvo com uma margem de erro (ex: 2 graus abaixo)
    # Isso evita que oscilações de 1 ou 2 graus travem o início
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER_TEMP-1} MAXIMUM={EXTRUDER_TEMP+2}

    M117 Prime Line...
    G92 E0
    G1 X5 Y5 Z0.3 F5000.0          
    G1 X5 Y200.0 Z0.3 F1500.0 E15  
    G1 X5.4 Y200.0 Z0.3 F5000.0    
    G1 X5.4 Y5 Z0.3 F1500.0 E30    
    G92 E0                         
    G1 Z2.0 F3000                  
    M117 Imprimindo!


[gcode_macro PRINT_END]
gcode:
    # 1. Armazena limites de movimento para segurança
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}

    # 2. Verifica se a posição atual permite subir o Z com segurança
    {% if printer.toolhead.position.z < (max_z - 20) %}
        {% set z_safe = 20.0 %}
    {% else %}
        {% set z_safe = max_z - printer.toolhead.position.z %}
    {% endif %}

    M400                          # Espera o buffer de movimentos limpar
    G92 E0                        # Reseta o extrusor
    G1 E-5.0 F3600                # Retração rápida de 5mm (evita "stringing" no fim)
    
    G91                           # Posicionamento Relativo
    G1 Z{z_safe} F3000            # Sobe o bico para não bater na peça
    
    G90                           # Posicionamento Absoluto
    G1 X{max_x / 2} Y{max_y - 10} F6000 # Move o bico para o fundo centralizado
    
    M104 S0                       # Desliga bico
    M140 S0                       # Desliga mesa
    M107                          # Desliga fans de resfriamento da peça
    
    M117 Impressao concluida!
    M84                           # Desliga motores

[gcode_macro LIMPAR_BICO]
gcode:
    # Garante que as coordenadas estão em modo absoluto
    G90 
    
    # Verifica se o bico está quente o suficiente para não quebrar a escova
    {% if printer.extruder.target < 180 %}
        M117 Aquecendo para limpar...
        M109 S200 ; Espera atingir 200°C (ajuste se preferir outra temperatura)
    {% endif %}

    M117 Limpando o bico...
    
    # 1. Mover rápido para o ponto seguro inicial (atrás do balde/escova)
    G1 X10 Y310 F9000                   

    # 2. Executa o movimento de vai e vem na escova (X245 até X206)
    G1 X245 Y310 F9000                  ; Vai para o início da escova
    
    G1 X206 Y310 F6000                  ; Passada 1 (Esquerda)
    G1 X245 Y310 F6000                  ; Passada 1 (Direita)
    G1 X206 Y310 F6000                  ; Passada 2 (Esquerda)
    G1 X245 Y310 F6000                  ; Passada 2 (Direita)
    G1 X206 Y310 F6000                  ; Passada 3 (Esquerda)
    
    G1 X10 Y310 F9000                   ; Afasta o bico da escova para o balde
    M117 Bico Limpo!

[gcode_macro CORTE_FILAMENTO]
gcode:
    _MMU_CUT_TIP
