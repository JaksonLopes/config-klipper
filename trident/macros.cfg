[gcode_macro PRINT_START]
gcode:
    # 1. Recebe os parâmetros de temperatura do fatiador (Orca/Prusa/Cura)
    {% set BED_TEMP = params.BED|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|default(200)|float %}

    # 2. Inicia o aquecimento (sem esperar) para ganhar tempo
    M117 Aquecendo mesa...
    M140 S{BED_TEMP}
    M104 S150             # Aquece o bico para 150C (evita escorrer filamento mas dilata o metal)

    # 3. Home e Preparação Física
    G90                   # Coordenadas absolutas
    M117 Homing...
    G28                   # Home geral (X, Y e Z no pino fixo)

    # 4. Espera a mesa chegar na temperatura alvo
    M117 Estabilizando mesa...
    M190 S{BED_TEMP}

    # 5. Alinhamento dos 3 motores (Z-Tilt)
    M117 Alinhando motores Z...
    PEGAR_SONDA
    Z_TILT_ADJUST
    G28 Z                 # Re-Home do Z após o alinhamento
    
    # 6. Mapeamento da Mesa (Opcional: carregar ou criar novo)
    M117 Carregando malha...
    BED_MESH_PROFILE LOAD=default
    # Se preferir criar uma malha nova toda vez, use: BED_MESH_CALIBRATE

    # 7. Calibração Automática do Z (Auto-Z)
    M117 Calibrando Offset Z...
    CALIBRATE_Z           # Executa a lógica entre bico, pino e Euclid

    GUARDAR_SONDA         # A Euclid precisa estar na dock para o bico tocar o pino fixo

    # 8. Aquecimento Final do Bico
    M117 Aquecimento final...
    G1 X150 Y150 Z10 F6000 # Move para o centro para aquecer longe da mesa
    M109 S{EXTRUDER_TEMP}

    # 9. Início da Impressão
    M117 Imprimindo...
    G92 E0                # Reseta o extrusor
    # Aqui você pode adicionar uma linha de purga (Prime Line) se desejar



[gcode_macro MAPEARE_MESA]
gcode:
    # 1. Faz Home se necessário
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    # 2. Garante que a mesa está alinhada antes de mapear
    PEGAR_SONDA
    Z_TILT_ADJUST
    G28 Z                 ; Home do Z novamente após alinhar a mesa

    # 3. Executa o mapeamento
    M117 Mapeando mesa...
    BED_MESH_CALIBRATE

    # 4. Finaliza
    G28 Z
    GUARDAR_SONDA
    M117 Mapa concluido!
    SAVE_CONFIG




#####################################################################
# Macros Euclid Probe - Voron Trident
#####################################################################

[gcode_macro PEGAR_SONDA]
gcode:
    G90
    G1 Z15 F600           
    QUERY_PROBE           
    _CHECK_PROBE_PICKUP

[gcode_macro _CHECK_PROBE_PICKUP]
gcode:
    # Se estiver TRIGGERED (last_query = True), significa que ESTÁ NA DOCK.
    # Então vamos buscar.
    {% if printer.probe.last_query %}
        M117 Indo buscar a sonda na dock...
        G1 X50 Y297 F10000  ; Ponto de espera
        G1 X0 F3000         ; Acopla
        G1 X50 F3000        ; Sai da trava
        G1 X150 Y150 F10000
        QUERY_PROBE
        _VERIFY_PICKUP_SUCCESS
    {% else %}
        M117 Sonda ja parece estar acoplada (circuito fechado).
    {% endif %}

[gcode_macro _VERIFY_PICKUP_SUCCESS]
gcode:
    # Agora, se funcionou, o estado tem que ter mudado para "open" (False)
    {% if printer.probe.last_query %}
        { action_raise_error("FALHA: A sonda ainda acusa TRIGGERED (não acoplou)!") }
    {% else %}
        M117 Sonda Acoplada com sucesso!
    {% endif %}

[gcode_macro GUARDAR_SONDA]
gcode:
    G90
    G1 Z15 F600
    QUERY_PROBE
    _CHECK_PROBE_DOCK

[gcode_macro _CHECK_PROBE_DOCK]
gcode:
    # Só guarda se estiver no bico (Estado "open" / last_query = False)
    {% if not printer.probe.last_query %}
        M117 Guardando Sonda na dock...
        G1 X50 Y297 F10000   
        G1 X0 F3000         
        G1 Y260 F6000       
        QUERY_PROBE
        _VERIFY_DOCK_SUCCESS
    {% else %}
        M117 Sonda ja esta na dock (ou desconectada).
    {% endif %}

[gcode_macro _VERIFY_DOCK_SUCCESS]
gcode:
    # Se soltou com sucesso, o estado tem que voltar para TRIGGERED (True)
    {% if not printer.probe.last_query %}
        { action_raise_error("FALHA: A sonda nao soltou (continua em open)!") }
    {% else %}
        M117 Sonda Guardada com sucesso!
        G1 X150 Y150 F10000
    {% endif %}