[gcode_macro PRINT_START]
gcode:
    {% set BED_TEMP = params.BED|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|default(230)|float %}

    M117 Aquecendo...
    M140 S{BED_TEMP}
    M104 S150             # Aquecimento parcial para expansão térmica

    G90                   
    G28                   # Home inicial

    M117 Estabilizando mesa...
    M190 S{BED_TEMP}

    M117 Alinhando motores Z...
    PEGAR_SONDA
    Z_TILT_ADJUST
    G28 Z                 # Obrigatório após Z-Tilt

    # --- CALIBRAÇÃO DO Z PRIMEIRO ---
    M117 Calibrando Z...
    CALIBRATE_Z           

    # --- CARREGAR MAPA POR ÚLTIMO ---
    M117 Carregando mapa inteligente...
    {% if BED_TEMP >= 90 %}
        BED_MESH_PROFILE LOAD=100deg
    {% elif BED_TEMP >= 50 %}
        BED_MESH_PROFILE LOAD=60deg
    {% else %}
        BED_MESH_PROFILE LOAD=default
    {% endif %}

    M117 Aquecimento final...
    G1 X150 Y150 Z10 F6000 
    # Define a temperatura mas não trava o processamento ainda
    M104 S{EXTRUDER_TEMP}
    # Aguarda a temperatura atingir o alvo com uma margem de erro (ex: 2 graus abaixo)
    # Isso evita que oscilações de 1 ou 2 graus travem o início
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER_TEMP-1} MAXIMUM={EXTRUDER_TEMP+2}

    M117 Prime Line...
    G92 E0
    G1 X5 Y5 Z0.3 F5000.0          
    G1 X5 Y200.0 Z0.3 F1500.0 E15  
    G1 X5.4 Y200.0 Z0.3 F5000.0    
    G1 X5.4 Y5 Z0.3 F1500.0 E30    
    G92 E0                         
    G1 Z2.0 F3000                  
    M117 Imprimindo!


[gcode_macro MAPEARE_MESA]
gcode:
    # 1. Faz Home se necessário
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    # 2. Garante que a mesa está alinhada antes de mapear
    PEGAR_SONDA
    Z_TILT_ADJUST
    G28 Z  ; Home do Z novamente após alinhar a mesa

    # 3. Executa o mapeamento
    M117 Mapeando mesa...
    BED_MESH_CALIBRATE

    # 4. Finaliza
    G28 Z
    GUARDAR_SONDA
    M117 Mapa concluido!
    SAVE_CONFIG



[gcode_macro PRINT_END]
gcode:
    # 1. Armazena limites de movimento para segurança
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}

    # 2. Verifica se a posição atual permite subir o Z com segurança
    {% if printer.toolhead.position.z < (max_z - 20) %}
        {% set z_safe = 20.0 %}
    {% else %}
        {% set z_safe = max_z - printer.toolhead.position.z %}
    {% endif %}

    M400                          # Espera o buffer de movimentos limpar
    G92 E0                        # Reseta o extrusor
    G1 E-5.0 F3600                # Retração rápida de 5mm (evita "stringing" no fim)
    
    G91                           # Posicionamento Relativo
    G1 Z{z_safe} F3000            # Sobe o bico para não bater na peça
    
    G90                           # Posicionamento Absoluto
    G1 X{max_x / 2} Y{max_y - 10} F6000 # Move o bico para o fundo centralizado
    
    M104 S0                       # Desliga bico
    M140 S0                       # Desliga mesa
    M107                          # Desliga fans de resfriamento da peça
    
    M117 Impressao concluida!
    M84                           # Desliga motores

#####################################################################
# Macros Euclid Probe - Voron Trident
#####################################################################

[gcode_macro PEGAR_SONDA]
gcode:
    G90
    G1 Z15 F600           
    QUERY_PROBE           
    _CHECK_PROBE_PICKUP

[gcode_macro _CHECK_PROBE_PICKUP]
gcode:
    # Se estiver TRIGGERED (last_query = True), significa que ESTÁ NA DOCK.
    # Então vamos buscar.
    {% if printer.probe.last_query %}
        M117 Indo buscar a sonda na dock...
        G1 X50 Y297 F10000  ; Ponto de espera
        G1 X0 F3000         ; Acopla
        G1 X50 F3000        ; Sai da trava
        G1 X150 Y150 F10000
        QUERY_PROBE
        _VERIFY_PICKUP_SUCCESS
    {% else %}
        M117 Sonda ja parece estar acoplada (circuito fechado).
    {% endif %}

[gcode_macro _VERIFY_PICKUP_SUCCESS]
gcode:
    # Agora, se funcionou, o estado tem que ter mudado para "open" (False)
    {% if printer.probe.last_query %}
        { action_raise_error("FALHA: A sonda ainda acusa TRIGGERED (não acoplou)!") }
    {% else %}
        M117 Sonda Acoplada com sucesso!
    {% endif %}

[gcode_macro GUARDAR_SONDA]
gcode:
    G90
    G1 Z15 F600
    QUERY_PROBE
    _CHECK_PROBE_DOCK

[gcode_macro _CHECK_PROBE_DOCK]
gcode:
    # Só guarda se estiver no bico (Estado "open" / last_query = False)
    {% if not printer.probe.last_query %}
        M117 Guardando Sonda na dock...
        G1 X50 Y297 F10000   
        G1 X0 F3000         
        G1 Y260 F6000       
        QUERY_PROBE
        _VERIFY_DOCK_SUCCESS
    {% else %}
        M117 Sonda ja esta na dock (ou desconectada).
    {% endif %}

[gcode_macro _VERIFY_DOCK_SUCCESS]
gcode:
    # Se soltou com sucesso, o estado tem que voltar para TRIGGERED (True)
    {% if not printer.probe.last_query %}
        { action_raise_error("FALHA: A sonda nao soltou (continua em open)!") }
    {% else %}
        M117 Sonda Guardada com sucesso!
        G1 X150 Y150 F10000
    {% endif %}