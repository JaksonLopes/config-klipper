[mcu ebb36]
canbus_uuid: f5fa191a0e2e

## SENSOR DE TEMPERATURA DA PLACA (Monitoramento do chip)
[temperature_sensor EBB36_Temp]
sensor_type: temperature_mcu
sensor_mcu: ebb36

## EXTRUSORA COM SENSOR BAMBU LAB
[extruder]
step_pin: ebb36:PD0
dir_pin: !ebb36:PD1
enable_pin: !ebb36:PD2
heater_pin: ebb36:PB13
sensor_type: Generic 3950 
sensor_pin: ebb36:PA3

max_extrude_only_distance: 700.00
max_extrude_cross_section: 50
full_steps_per_rotation: 200
filament_diameter: 1.750
rotation_distance: 13.60
nozzle_diameter: 0.400
pullup_resistor: 4700 # Padrão da EBB36
gear_ratio: 50:17
microsteps: 16
microsteps: 16
min_extrude_temp: 180
max_temp: 300 
min_temp: 0
# pressure_advance: .05
# pressure_advance_smooth_time: 0.040


[tmc2209 extruder]
uart_pin: ebb36:PA15
run_current: 0.5
hold_current: 0.4
sense_resistor: 0.110
stealthchop_threshold: 0
interpolate: True

[fan]
pin: ebb36:PA1 

[heater_fan hotend_fan]
pin: ebb36:PA0 
heater: extruder
max_power: 1.0
kick_start_time: 0.5
heater_temp: 50.0




