[mcu ebb36]
canbus_uuid: f5fa191a0e2e

# COMENTE OU DELETE ESTA SEÇÃO ABAIXO PARA TIRAR O CONFLITO
[temperature_sensor EBB36_Temp]
sensor_type: temperature_mcu
sensor_mcu: ebb36

[extruder]
step_pin: ebb36:PD0
dir_pin: ebb36:PD1
enable_pin: !ebb36:PD2
microsteps: 16
rotation_distance: 22.67
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: ebb36:PB13
# Mantemos este como sensor interno para o Klipper aceitar o boot
sensor_type: temperature_mcu
sensor_mcu: ebb36
min_temp: 0
max_temp: 280
control: pid
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982

[tmc2209 extruder]
uart_pin: ebb36:PA15
run_current: 0.650

[fan]
pin: ebb36:PA0

[heater_fan hotend_fan]
pin: ebb36:PA0 
heater: extruder
heater_temp: 50.0