[mcu ebb36]
canbus_uuid: f5fa191a0e2e

## SENSOR DE TEMPERATURA DA PLACA (Monitoramento do chip)
[temperature_sensor EBB36_Temp]
sensor_type: temperature_mcu
sensor_mcu: ebb36

## EXTRUSORA COM SENSOR BAMBU LAB
[extruder]
step_pin: ebb36:PD0
dir_pin: !ebb36:PD1
enable_pin: !ebb36:PD2
microsteps: 16
rotation_distance: 13.60
gear_ratio: 50:17
microsteps: 16
full_steps_per_rotation: 200 # Se seu motor for de 1.8 graus
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: ebb36:PB13

# Configuração para o termistor do kit Bambu Lab X1
sensor_type: Generic 3950 
sensor_pin: ebb36:PA3
pullup_resistor: 4700 # Padrão da EBB36


min_temp: 0
max_temp: 300 # O bico Bambu aguenta temperaturas maiores

[tmc2209 extruder]
uart_pin: ebb36:PA15
run_current: 0.650

[fan]
pin: ebb36:PA1 

[heater_fan hotend_fan]
pin: ebb36:PA0 
heater: extruder
heater_temp: 50.0