[mcu ebb36]
canbus_uuid: f5fa191a0e2e

## SENSOR DE TEMPERATURA DA PLACA
# [temp_sensor EBB36]
# sensor_type: temperature_mcu
# sensor_mcu: ebb36

## EXTRUSORA
[extruder]
step_pin: ebb36:PD0
dir_pin: ebb36:PD1
enable_pin: !ebb36:PD2
microsteps: 16
rotation_distance: 22.67 # Valor para BMG/Clockwork. Ajuste conforme sua extrusora.
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: ebb36:PB13
sensor_type: EPCOS 100K B57560G1104F # Termistor NTC 100K padrão
sensor_pin: ebb36:PA3
control: pid
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982
min_temp: 0
max_temp: 280

[tmc2209 extruder]
uart_pin: ebb36:PA15
run_current: 0.650
stealthchop_threshold: 999999

## FANS (VENTOINHAS)
[fan]
pin: ebb36:PA1 # Fan de Resfriamento da Peça (FAN2 na foto)

[heater_fan hotend_fan]
pin: ebb36:PA0 # Fan do Hotend (FAN1 na foto)
heater: extruder
heater_temp: 50.0


## LED RGB (Opcional - Se você tiver LEDs no cabeçote)
