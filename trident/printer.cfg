[include mainsail.cfg]
[include ebb36.cfg]

[mcu]
canbus_uuid: fdfd50e92d20

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000

[heater_bed]
# Usei PB10 aqui para deixar o PA1 livre para os motores
heater_pin: PB10 
sensor_type: temperature_mcu
sensor_mcu: mcu
min_temp: 0
max_temp: 120
control: watermark

[stepper_x]
step_pin: PA0 
dir_pin: PA1   # Agora o PA1 é só do motor X
enable_pin: !PA2
microsteps: 16
rotation_distance: 40
endstop_pin: ebb36:PB7 
position_endstop: 0
position_max: 300
homing_speed: 50

[stepper_y]
step_pin: PA3
dir_pin: PA4
enable_pin: !PA5
microsteps: 16
rotation_distance: 40
endstop_pin: PD2
position_endstop: 0
position_max: 300
homing_speed: 50

########################################
# Z Stepper Settings (Frente Esquerda)
########################################
[stepper_z]
step_pin: PC5
dir_pin: PC4
enable_pin: !PB0
rotation_distance: 8
microsteps: 16
endstop_pin: PA10 # Pino marcado como PA10 no diagrama da D7
position_endstop: 0
position_max: 250

[tmc2209 stepper_z]
uart_pin: PA7
run_current: 0.800

########################################
# Z1 Stepper Settings (Fundo Central)
########################################
[stepper_z1]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
rotation_distance: 8
microsteps: 16

[tmc2209 stepper_z1]
uart_pin: PB1
run_current: 0.800

########################################
# Z2 Stepper Settings (Frente Direita)
########################################
[stepper_z2]
step_pin: PC12
dir_pin: PB5
enable_pin: !PC11
rotation_distance: 8
microsteps: 16

[tmc2209 stepper_z2]
uart_pin: PB6
run_current: 0.800


[virtual_sdcard]
path: /home/biqu/printer_data/gcodes

