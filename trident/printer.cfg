[include mainsail.cfg]
[include ebb36.cfg]

[extruder]
control: pid
pid_kp: 20
pid_ki: 1
pid_kd: 100

[mcu]
canbus_uuid: fdfd50e92d20

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000

[heater_bed]
# Usei PB10 aqui para deixar o PA1 livre para os motores
heater_pin: PB10 
sensor_type: temperature_mcu
sensor_mcu: mcu
min_temp: 0
max_temp: 120
control: watermark

[stepper_x]
step_pin: PA0 
dir_pin: PA1   # Agora o PA1 é só do motor X
enable_pin: !PA2
microsteps: 16
rotation_distance: 40
endstop_pin: ebb36:PB6 
position_endstop: 0
position_max: 300
homing_speed: 50

[stepper_y]
step_pin: PA3
dir_pin: PA4
enable_pin: !PA5
microsteps: 16
rotation_distance: 40
endstop_pin: PA6 
position_endstop: 0
position_max: 300
homing_speed: 50

[stepper_z]
step_pin: PA7
dir_pin: PA8
enable_pin: !PA9
microsteps: 16
rotation_distance: 8
endstop_pin: PA10 
position_endstop: 0
position_max: 250


[virtual_sdcard]
path: /home/biqu/printer_data/gcodes