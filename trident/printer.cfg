[include mainsail.cfg]
[include ebb36.cfg]

[mcu]
canbus_uuid: fdfd50e92d20

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000

[heater_bed]
# Usei PB10 aqui para deixar o PA1 livre para os motores
heater_pin: PC7
sensor_type: temperature_mcu
sensor_mcu: mcu
min_temp: 0
max_temp: 120
control: watermark

[stepper_x]
step_pin: PC14
dir_pin: PC13
enable_pin: !PC15
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: ^ebb36:PB7  # Seu sensor no carrinho via CAN
position_endstop: 300   # Ajuste para o tamanho da sua mesa
position_max: 300
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: PB7
run_current: 0.800

[stepper_y]
step_pin: PA1
dir_pin: PA0
enable_pin: !PA2
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: ^PD2        # Sua porta física na placa D7
position_endstop: 309
position_max: 309
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PC3
run_current: 0.800

########################################
# Z Stepper Settings (Frente Esquerda)
########################################
# Motor Frente Esquerda
[stepper_z]
step_pin: PA5
dir_pin: !PA4
enable_pin: !PA6
rotation_distance: 8
microsteps: 16
endstop_pin: PA9 # Verifique se seu Probe/Z-Endstop está aqui
position_endstop: 0
position_max: 230
position_min: -5

[safe_z_home]
home_xy_position: 171, 275.5
speed: 50

[tmc2209 stepper_z]
uart_pin: PA3
run_current: 0.800

# Motor Fundo Central
[stepper_z1]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
rotation_distance: 8
microsteps: 16

[tmc2209 stepper_z1]
uart_pin: PB1
run_current: 0.800

# Motor Frente Direita
[stepper_z2]
step_pin: PC12
dir_pin: PB5
enable_pin: !PC11
rotation_distance: 8
microsteps: 16

[tmc2209 stepper_z2]
uart_pin: PB6
run_current: 0.800

[tmc2209 stepper_z2]
uart_pin: PB6
run_current: 0.800


[virtual_sdcard]
path: /home/biqu/printer_data/gcodes

