#####################################################################
#   ARQUIVOS DE CONFIGURAÇÃO EXTERNOS
#####################################################################
[include mainsail.cfg]    # Interface web Mainsail
[include ebb36.cfg]       # Configurações da placa de ferramenta (Toolboard)
[include macros.cfg]      # Suas macros (PRINT_START, PEGAR_SONDA, etc.)

#####################################################################
#   CONEXÃO E CINEMÁTICA
#####################################################################
[mcu]
canbus_uuid: fdfd50e92d20  # ID único de comunicação da placa principal via CANbus

[printer]
kinematics: corexy           # Estilo de movimento (X e Y trabalham juntos)
max_velocity: 500            # Velocidade máxima de deslocamento (mm/s)
max_accel: 6500              # Aceleração máxima (mm/s²)
max_z_velocity: 5            # Velocidade máxima do eixo Z (lenta para precisão)
max_z_accel: 100             # Aceleração do eixo Z
square_corner_velocity: 5.0  # Velocidade de entrada em curvas/cantos

#####################################################################
#   EIXO X (Motor A)
#####################################################################
[stepper_x]
step_pin: PC14
dir_pin: PC13
enable_pin: !PC15
rotation_distance: 40        # Distância percorrida em uma volta completa (Polia 20T)
microsteps: 32               # Divisão de passos para suavidade
full_steps_per_rotation: 200 # Passos nativos do motor (1.8 graus)
endstop_pin: ^ebb36:PB8      # Fim de curso conectado na EBB36
position_endstop: 300        # Posição zero lógica do X
position_min: 0
position_max: 300            # Tamanho total da mesa no X
homing_speed: 50             # Velocidade para buscar o fim de curso
homing_retract_dist: 5       # Recuo após tocar o sensor para repetir o toque
homing_positive_dir: true    # X faz home para o lado máximo (direita)

[tmc2209 stepper_x]
uart_pin: PB7
run_current: 0.900           # Corrente de operação (Amperes)
hold_current: 0.750          # Corrente em repouso
interpolate: false           # Desativado para maior precisão de passos
stealthchop_threshold: 0     # 0 = SpreadCycle (Modo de força/precisão da Voron)
sense_resistor: 0.110        # Resistor de medição de corrente do driver

#####################################################################
#   EIXO Y (Motor B)
#####################################################################
[stepper_y]
step_pin: PA1
dir_pin: PA0
enable_pin: !PA2
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: ^PD2
position_endstop: 309
position_max: 309
homing_speed: 50
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PC3
run_current: 0.900
hold_current: 0.750
interpolate: false
stealthchop_threshold: 0
sense_resistor: 0.110

#####################################################################
#   EIXO Z (Três Motores Independentes)
#####################################################################

# Motor Frente Esquerda
[stepper_z]
step_pin: PA5
dir_pin: !PA4
enable_pin: !PA6
rotation_distance: 8         # Fuso trapezoidal de 8mm de avanço
microsteps: 16
endstop_pin: PA9             # Pino do Endstop físico (o pino de metal)
position_endstop: 0          # Referência zero do Z
position_max: 230            # Altura útil da impressora
position_min: -15            # Permite descer um pouco abaixo do zero para calibração
homing_speed: 50
homing_retract_dist: 5.0
second_homing_speed: 3       # Velocidade lenta para o segundo toque de precisão

[tmc2209 stepper_z]
uart_pin: PA3
run_current: 0.650
hold_current: 0.450
stealthchop_threshold: 30    # Mantém Z silencioso em repouso
interpolate: True
sense_resistor: 0.110

# Motor Fundo Central
[stepper_z1]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
rotation_distance: 8
microsteps: 16

[tmc2209 stepper_z1]
uart_pin: PB1
run_current: 0.650
hold_current: 0.450
stealthchop_threshold: 30
interpolate: True
sense_resistor: 0.110

# Motor Frente Direita
[stepper_z2]
step_pin: PC12
dir_pin: PB5
enable_pin: !PC11
rotation_distance: 8
microsteps: 16

[tmc2209 stepper_z2]
uart_pin: PB6
run_current: 0.650
hold_current: 0.450
stealthchop_threshold: 30
interpolate: True
sense_resistor: 0.110

#####################################################################
#   LÓGICA DE HOMING (Substitui o Safe Z Home)
#####################################################################
[homing_override]
axes: z                      # Controla como o eixo Z faz home
set_position_z: 0            # Define Z como 0 temporariamente para permitir movimento
gcode:
    G90                      # Coordenadas absolutas
    G28 X Y                  # Faz home de X e Y primeiro para saber onde está
    G0 X172 Y309 F3600       # Move o bico para cima do pino de Z físico
    G28 Z                    # Executa o home do Z no pino
    G0 Z5 F3000              # Sobe 5mm após o home para o bico não ficar colado no pino

#####################################################################
#   AQUECIMENTO DA MESA
#####################################################################
[heater_bed]
heater_pin: PC7
sensor_type: temperature_mcu # Usa o sensor de temperatura da placa (ajuste se tiver termistor na mesa)
sensor_mcu: mcu
max_power: 0.6               # Limita potência a 60% (segurança para mesas AC/Potentes)
min_temp: 0
max_temp: 120
control: watermark           # Controle de temperatura simples (on/off rápido)

#####################################################################
#   SONDA E SENSORES (Euclid Probe)
#####################################################################
[probe]
pin: ^ebb36:PB9              # Pino da sonda na EBB36
x_offset: 3.0                # Distância lateral entre bico e sonda
y_offset: 27.0               # Distância frontal entre bico e sonda
z_offset: 0                  # Altura da sonda (será gerenciada pelo Auto-Z)
speed: 10
samples: 3                   # Quantas vezes mede cada ponto
sample_retract_dist: 3.0     # Recuo entre medições
lift_speed: 10.0
samples_result: median       # Usa o valor mediano das 3 amostras
samples_tolerance: 0.006     # Tolerância máxima entre amostras
samples_tolerance_retries: 3 # Tenta novamente se a tolerância falhar

[adxl345]                    # Acelerômetro para Input Shaper
cs_pin: ebb36:PB12
spi_bus: spi2_PB2_PB11_PB10
axes_map: x,y,z

[resonance_tester]
accel_chip: adxl345
probe_points:
    150, 150, 20             # Ponto central para testar ressonância

#####################################################################
#   SISTEMAS DE NIVELAMENTO AUTOMÁTICO
#####################################################################

[z_tilt]
z_positions:                 # Coordenadas reais dos fusos (motores)
    -50, 18
    150, 348
    350, 18
points:                      # Onde a sonda vai tocar para nivelar os 3 motores
    30, 30
    150, 260
    270, 30
speed: 200
horizontal_move_z: 15        # Altura de segurança durante o Z-Tilt
retries: 3
retry_tolerance: 0.0075      # Precisão alvo para o nivelamento entre motores

[bed_mesh]
speed: 300
horizontal_move_z: 2
mesh_min: 30, 30             # Início da grade de medição
mesh_max: 270, 270           # Fim da grade de medição
probe_count: 5, 5            # Grade de 5x5 (25 pontos)
algorithm: bicubic
fade_start: 0.6              # Começa a parar de compensar a malha em 0.6mm
fade_end: 10.0               # Em 10mm de altura, a compensação da mesa é zero

[z_calibration]
nozzle_xy_position:   172, 309   # Coordenada onde o bico toca o pino
switch_xy_position:   174.5, 282 # Coordenada onde o corpo da sonda toca o pino
bed_xy_position:      150, 150   # Coordenada onde a sonda toca a mesa
switch_offset:        0.528      # DIFERENÇA entre o corpo da sonda e o botão (O MAIS IMPORTANTE)
max_deviation:        6.0        # Desvio máximo aceitável antes de erro
offset_margins:       -5.0, 7.0  # Janela de segurança para o cálculo do offset
start_gcode:          PEGAR_SONDA # Comando para buscar a Euclid antes de calibrar
end_gcode:            GUARDAR_SONDA # Comando para devolver a Euclid após calibrar

#####################################################################
#   CONFIGURAÇÕES DO SISTEMA
#####################################################################
[idle_timeout]
timeout: 1800                # Desliga motores/aquecimento após 30 min parado

[virtual_sdcard]
path: /home/biqu/printer_Trident_data/gcodes # Pasta dos arquivos Gcode

# relative_reference_index: 12  # Opcional: define o ponto central como referência zero

