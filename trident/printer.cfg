[include mainsail.cfg]
[include ebb36.cfg]
[include macros.cfg]

[mcu]
canbus_uuid: fdfd50e92d20

[probe]
pin: ^ebb36:PB9   
# Se o QUERY_PROBE aparecer como "TRIGGERED" sem estar na mesa, tente ^!ebb36:PB9
x_offset: 3.0
y_offset: 27.0
z_offset: 0        # Calibre isso depois com PROBE_CALIBRATE
speed: 5.0
samples: 3
sample_retract_dist: 3.0
lift_speed: 10.0
samples_result: median
samples_tolerance: 0.006
samples_tolerance_retries: 3

[adxl345]
cs_pin: ebb36:PB12
spi_bus: spi2_PB2_PB11_PB10
axes_map: x,y,z

[resonance_tester]
accel_chip: adxl345
probe_points:
    150, 150, 20

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 5000
max_z_velocity: 5
max_z_accel: 100
square_corner_velocity: 5.0

[heater_bed]
heater_pin: PC7
sensor_type: temperature_mcu
sensor_mcu: mcu

max_power: 0.6
min_temp: 0
max_temp: 120
control: watermark

[stepper_x]
step_pin: PC14
dir_pin: PC13
enable_pin: !PC15
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: ^ebb36:PB8
position_endstop: 300
position_min: 0
position_max: 300
homing_speed: 50
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PB7
run_current: 0.900
hold_current: 0.750
interpolate: True
stealthchop_threshold: 0

[stepper_y]
step_pin: PA1
dir_pin: PA0
enable_pin: !PA2
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: ^PD2
position_endstop: 309
position_max: 309
homing_speed: 50
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PC3
run_current: 0.900
hold_current: 0.750
interpolate: True
stealthchop_threshold: 0

########################################
# Z Stepper Settings (Frente Esquerda)
########################################
# Motor Frente Esquerda
[stepper_z]
step_pin: PA5
dir_pin: !PA4
enable_pin: !PA6
rotation_distance: 8
microsteps: 16
endstop_pin: PA9
position_endstop: 0
position_max: 230
homing_speed: 35.0
position_min: -15

[safe_z_home]
home_xy_position: 172, 309
speed: 50

[tmc2209 stepper_z]
uart_pin: PA3
run_current: 0.650
hold_current: 0.450
stealthchop_threshold: 30
interpolate: True

# Motor Fundo Central
[stepper_z1]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
rotation_distance: 8
microsteps: 16

[tmc2209 stepper_z1]
uart_pin: PB1
run_current: 0.650
hold_current: 0.450
stealthchop_threshold: 30
interpolate: True

# Motor Frente Direita
[stepper_z2]
step_pin: PC12
dir_pin: PB5
enable_pin: !PC11
rotation_distance: 8
microsteps: 16

[tmc2209 stepper_z2]
uart_pin: PB6
run_current: 0.650
hold_current: 0.450
stealthchop_threshold: 30
interpolate: True

[idle_timeout]
timeout: 1800

[virtual_sdcard]
path: /home/biqu/printer_Trident_data/gcodes


[z_tilt]
z_positions:
    -50, 18           # Coordenada física do motor Z (trás/esquerda)
    150, 348          # Coordenada física do motor Z (trás/centro)
    350, 18           # Coordenada física do motor Z (trás/direita)
# Nota: Esses valores acima são típicos da Trident 300, ajuste se seus motores estiverem em posições diferentes.

points:
    30, 30            # Ponto de medição 1 (frente esquerda)
    150, 260          # Ponto de medição 2 (centro fundo)
    270, 30           # Ponto de medição 3 (frente direita)
speed: 300
horizontal_move_z: 15 # Altura segura para o Euclid não bater
retries: 3
retry_tolerance: 0.0075

[bed_mesh]
speed: 300
horizontal_move_z: 3   # Altura de segurança para viajar entre pontos
mesh_min: 30, 30        # Ponto inicial (Sonda em 30,30)
mesh_max: 270, 270      # Ponto final (Sonda em 270,270)
probe_count: 5, 5       # Grade de 25 pontos (ideal para 300mm)
algorithm: bicubic
fade_start: 0.6
fade_end: 10.0

[z_calibration]
start_gcode:          PEGAR_SONDA
end_gcode:            GUARDAR_SONDA
# Onde o seu BICO tocou (coordenada anterior)
nozzle_xy_position:   172, 309   

# Onde a sua SONDA tocou agora (sua medição real)
switch_xy_position:   174.5, 282
# Aumentamos os limites para o Klipper não travar
max_deviation: 6.0               # Como a diferença é de 5mm, precisamos de margem
offset_margins: -5.0, 7.0        # Permite que o offset seja maior que 1.0
bed_xy_position:      150, 150
# O pulo do gato:
# Se a sonda é 5mm mais baixa, o switch_offset deve ser por aí:
switch_offset: 0.528            # Valor inicial sugerido para testar



# relative_reference_index: 12  # Opcional: define o ponto central como referência zero

