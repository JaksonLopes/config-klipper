[include mainsail.cfg]
[include ebb36.cfg]

[display_status]
[pause_resume]
[include macros.cfg]
[include FLY_D5.cfg]

[mcu]
canbus_uuid: fdfd50e92d20


[adxl345]
cs_pin: PB12
spi_bus: spi2

[resonance_tester]
accel_chip: adxl345
probe_points:
    117, 117, 20


########################################
# Drives
########################################

[temperature_sensor Fly-D5]     # FLY主板温度(可自行重命名)
sensor_type: temperature_mcu 


[temperature_sensor host]
sensor_type: temperature_host
min_temp: 0
max_temp: 100


[screws_tilt_adjust]
screw1: 72.7, 45
screw1_name: Frente-Esquerda

screw2: 242.7, 45
screw2_name: Frente-Direita

screw3: 72.7, 215
screw3_name: Trás-Esquerda

screw4: 242.7, 215
screw4_name: Trás-Direita

speed: 150
horizontal_move_z: 10
screw_thread: CW-M4


[gcode_macro SCREWS_CALCULATE]
gcode:
 SCREWS_TILT_CALCULATE


[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 8000
max_z_velocity: 50
max_z_accel: 1000

[stepper_x]
step_pin: D0_STEP
dir_pin: !D0_DIR
enable_pin: !D0_EN
microsteps: 32
rotation_distance: 40
endstop_pin: D0_STOP
position_endstop: 0
position_max: 247
homing_speed: 40

[stepper_y]
step_pin: D1_STEP
dir_pin: !D1_DIR
enable_pin: !D1_EN
microsteps: 32
rotation_distance: 40
endstop_pin: D1_STOP
position_endstop: 0
position_max: 230
homing_speed: 40

[stepper_z]
step_pin: D2_STEP
dir_pin: D2_DIR
enable_pin: !D2_EN
microsteps: 32
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
# position_endstop: 0.0
position_max: 250
position_min:-8.0



[tmc2209 stepper_x]
uart_pin: D0_CS
run_current: 0.700
interpolate: True
stealthchop_threshold: 500

[tmc2209 stepper_y]
uart_pin: D1_CS
run_current: 0.700
interpolate: True
stealthchop_threshold: 500

[tmc2209 stepper_z]
uart_pin: D2_CS
run_current: 0.650
interpolate: True
stealthchop_threshold: 500

[tmc2209 extruder]
uart_pin: D3_CS
run_current: 0.750
interpolate: True
stealthchop_threshold: 500

[heater_bed]
heater_pin: PB2 # Ou o pino original da sua Fly-D7
sensor_type: Generic 3950
sensor_pin: PC1 # Ou o pino original da sua Fly-D7
min_temp: -100 # Truque: baixamos a min_temp para aceitar a leitura "vazia"
max_temp: 120
control: watermark


[virtual_sdcard]
path: /home/biqu/printer_data/gcodes



