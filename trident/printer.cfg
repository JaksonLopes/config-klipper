#####################################################################
#    ARQUIVOS DE CONFIGURAÇÃO EXTERNOS
#####################################################################
# --------------------------------------------------------------------
# [include mmu/base/*.cfg]
# [include mmu/optional/client_macros.cfg]
# # [include mmu/addons/blobifier.cfg]
# [include mmu/addons/mmu_erec_cutter.cfg]
# --------------------------------------------------------------------

[include mainsail.cfg]    # Interface web Mainsail
[include ebb36.cfg]       # Configurações da placa de ferramenta (Toolboard)
[include macros.cfg]      # Suas macros (PRINT_START, etc.)
[include Eddy.cfg]      # Suas macros (PRINT_START, etc.)

#####################################################################
#    CONEXÃO E CINEMÁTICA
#####################################################################
[mcu]
canbus_uuid: fdfd50e92d20  # ID único de comunicação da placa principal via CANbus

[mcu mmu]
canbus_uuid: f26f15ebcfb6

[printer]
kinematics: corexy           # Estilo de movimento (X e Y trabalham juntos)
max_velocity: 500            # Velocidade máxima de deslocamento (mm/s)
max_accel: 6500              # Aceleração máxima (mm/s²)
max_z_velocity: 5            # Velocidade máxima do eixo Z (lenta para precisão)
max_z_accel: 100             # Aceleração do eixo Z
square_corner_velocity: 5.0  # Velocidade de entrada em curvas/cantos

#####################################################################
#    MONITORAMENTO DE TEMPERATURAS
#####################################################################

[temperature_sensor Fly-D7]
sensor_type: temperature_mcu
sensor_mcu: mcu
min_temp: 0
max_temp: 90

[temperature_sensor Host]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

#####################################################################
#    EIXO X (Motor A)
#####################################################################
[stepper_x]
step_pin: PC14
dir_pin: PC13
enable_pin: !PC15
rotation_distance: 40        # Distância percorrida em uma volta completa (Polia 20T)
microsteps: 32               # Divisão de passos para suavidade
full_steps_per_rotation: 200 # Passos nativos do motor (1.8 graus)
endstop_pin: ^ebb36:PB8      # Fim de curso conectado na EBB36
position_endstop: 300        # Posição zero lógica do X
position_min: 0
position_max: 300            # Tamanho total da mesa no X
homing_speed: 50             # Velocidade para buscar o fim de curso
homing_retract_dist: 5       # Recuo após tocar o sensor para repetir o toque
homing_positive_dir: true    # X faz home para o lado máximo (direita)

[tmc2209 stepper_x]
uart_pin: PB7
run_current: 0.900           # Corrente de operação (Amperes)
hold_current: 0.750          # Corrente em repouso
interpolate: false           # Desativado para maior precisão de passos
stealthchop_threshold: 0     # 0 = SpreadCycle (Modo de força/precisão da Voron)
sense_resistor: 0.110        # Resistor de medição de corrente do driver

#####################################################################
#    EIXO Y (Motor B)
#####################################################################
[stepper_y]
step_pin: PA1
dir_pin: PA0
enable_pin: !PA2
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: ^PD2
position_endstop: 310
position_max: 311
homing_speed: 50
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PC3
run_current: 0.900
hold_current: 0.750
interpolate: false
stealthchop_threshold: 0
sense_resistor: 0.110

#####################################################################
#    EIXO Z (Três Motores Independentes)
#####################################################################
# Motor Frente Esquerda
[stepper_z]
step_pin: PA5
dir_pin: PA4
enable_pin: !PA6
rotation_distance: 8         # Fuso trapezoidal de 8mm de avanço
microsteps: 16
endstop_pin: probe:z_virtual_endstop
position_max: 230            # Altura útil da impressora
position_min: -5            # Permite descer abaixo do zero para calibração inicial
homing_speed: 10             # Velocidade reduzida e segura para o Eddy Duo encontrar o metal
homing_retract_dist: 5.0
second_homing_speed: 3       # Velocidade lenta para o segundo toque de precisão


[tmc2209 stepper_z]
uart_pin: PA3
run_current: 0.650
hold_current: 0.450
stealthchop_threshold: 30    # Mantém Z silencioso em repouso
interpolate: True
sense_resistor: 0.110

# Motor Fundo Central
[stepper_z1]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
rotation_distance: 8
microsteps: 16

[tmc2209 stepper_z1]
uart_pin: PB1
run_current: 0.650
hold_current: 0.450
stealthchop_threshold: 30
interpolate: True
sense_resistor: 0.110

# Motor Frente Direita
[stepper_z2]
step_pin: PC12
dir_pin: PB5
enable_pin: !PC11
rotation_distance: 8
microsteps: 16

[tmc2209 stepper_z2]
uart_pin: PB6
run_current: 0.650
hold_current: 0.450
stealthchop_threshold: 30
interpolate: True
sense_resistor: 0.110

#####################################################################
#    LÓGICA DE HOMING PADRÃO (Centro da Mesa)
#####################################################################
[safe_z_home]
home_xy_position: 150, 150   # Centro exato da chapa PEI de 300mm
speed: 200                   # Velocidade estável de deslocamento
z_hop: 10                    # Afastamento físico de segurança
z_hop_speed: 10

#####################################################################
#    SONDA MAGNÉTICA BTT EDDY
# #####################################################################
# [probe_eddy_current btt_eddy]
# sensor_type: ldc1612
# # z_offset: 4
# i2c_mcu: eddy
# i2c_bus: i2c0f
# x_offset: 0                  # Coordenadas com base no show Carrier / Archetype 4T
# y_offset: 23.5
# samples: 3
# samples_result: median
# samples_tolerance: 0.01
# samples_tolerance_retries: 3

#####################################################################
#    NIVELAMENTO AUTOMÁTICO E MALHA DA MESA
#####################################################################
[z_tilt]
z_positions:                 # Coordenadas reais dos fusos (motores físicos)
    -50, 18
    150, 348
    350, 18
points:                      # Pontos onde o Eddy vai medir para corrigir o balanço dos motores
    30, 3
    150, 260
    270, 3
speed: 200
horizontal_move_z: 5        # Altura de transição segura
retries: 2
retry_tolerance: 0.0075      # Tolerância fina padrão Voron

[bed_mesh]
speed: 300
horizontal_move_z: 2         # Pode ser menor (2mm) já que ele não vai ficar a subir e a descer
mesh_min: 10, 25
mesh_max: 285, 285
probe_count: 12, 12          # Com o modo scan podes até aumentar para 20,20 se quiseres, continua ultra rápido!
algorithm: bicubic
fade_start: 0.6
fade_end: 10.0
zero_reference_position: 150, 150

#####################################################################
#    TESTE DE RESSONÂNCIA (Input Shaper na EBB36)
#####################################################################
[adxl345]
cs_pin: ebb36:PB12
spi_bus: spi2_PB2_PB11_PB10
axes_map: x,y,z

[resonance_tester]
accel_chip: adxl345
probe_points:
    150, 150, 20             # Centro do volume de impressão

#####################################################################
#    AQUECIMENTO DA MESA
#####################################################################
[heater_bed]
heater_pin: PC7
sensor_type: Generic 3950
sensor_pin: PC0
max_power: 0.8
min_temp: 0
max_temp: 120

[verify_heater heater_bed]
max_error: 120               # Evita falsos gatilhos de aquecimento lento
check_gain_time: 60
hysteresis: 5
heating_gain: 2

#####################################################################
#    CONFIGURAÇÕES ADICIONAIS DO SISTEMA
#####################################################################
[idle_timeout]
timeout: 1800                # Tempo de espera antes de desativar os motores (30 min)

[virtual_sdcard]
path: /home/biqu/printer_Trident_data/gcodes

[exclude_object]

[controller_fan cooler_eletronica]
pin: PC8
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5
stepper: stepper_x, stepper_y, stepper_z
idle_timeout: 30
fan_speed: 0.8

