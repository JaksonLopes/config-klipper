########################################
# INCLUDES
########################################  
[include mainsail.cfg]
[include macros.cfg]
[include FLY_D5.cfg]

########################################
# MCU
########################################
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f072xb_450049000757465036383420-if00

########################################
# PRINTER
########################################
[printer]
kinematics: cartesian
max_velocity: 200
max_accel: 3000
max_z_velocity: 15           
max_z_accel: 100              

########################################
# STEPPERS
########################################
[stepper_x]
step_pin: D0_STEP
dir_pin: !D0_DIR
enable_pin: !D0_EN
microsteps: 16
rotation_distance: 40
endstop_pin: D0_STOP
position_endstop: 0
position_max: 247
homing_speed: 40

[stepper_y]
step_pin: D1_STEP
dir_pin: !D1_DIR
enable_pin: !D1_EN
microsteps: 16
rotation_distance: 40
endstop_pin: D1_STOP
position_endstop: 0
position_max: 230
homing_speed: 40

[stepper_z]
step_pin: D2_STEP
dir_pin: D2_DIR
enable_pin: !D2_EN
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min: -8.0

########################################
# TMC DRIVERS
########################################
[tmc2209 stepper_x]
uart_pin: D0_CS
run_current: 0.700
interpolate: false
stealthchop_threshold: 0

[tmc2209 stepper_y]
uart_pin: D1_CS
run_current: 0.700
interpolate: false
stealthchop_threshold: 0

[tmc2209 stepper_z]
uart_pin: D2_CS
run_current: 0.650
interpolate: false
stealthchop_threshold: 0

[tmc2209 extruder]
uart_pin: D3_CS
run_current: 0.750
interpolate: false
stealthchop_threshold: 0

########################################
# EXTRUDER
########################################
[extruder]
step_pin: D3_STEP
dir_pin: !D3_DIR
enable_pin: !D3_EN
microsteps: 16
rotation_distance: 7.895      
nozzle_diameter: 0.4
filament_diameter: 1.750
pressure_advance: 0.16       

# Limites de segurança e segurança contra extrusão a frio
min_extrude_temp: 180         
max_extrude_only_distance: 200.00 
max_extrude_cross_section: 99 

heater_pin: HEAT0
sensor_pin: HEAT0_TEMP
sensor_type: EPCOS 100K B57560G104F
min_temp: 0
max_temp: 280
max_extrude_only_velocity: 80
max_extrude_only_accel: 600

########################################
# HEATED BED
########################################
[heater_bed]
heater_pin: BED_OUT
sensor_pin: BED_TEMP
sensor_type: EPCOS 100K B57560G104F
min_temp: 0
max_temp: 110

########################################
# TEMPERATURE SENSORS
########################################
[temperature_sensor Fly-D5]
sensor_type: temperature_mcu

[temperature_sensor host]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

########################################
# BLTOUCH & HOMING
########################################
[bltouch]
sensor_pin: ^D3_STOP
control_pin: SERVO
pin_move_time: 0.680
x_offset: -40.7
y_offset: -13
speed: 10
samples: 2
samples_result: median
sample_retract_dist: 5

[safe_z_home]
home_xy_position: 153,125
speed: 50
z_hop: 10
z_hop_speed: 50

########################################
# BED MESH
########################################
[bed_mesh]
algorithm: bicubic
speed: 150                   
horizontal_move_z: 8        
mesh_min: 10, 15
mesh_max: 206, 210
probe_count: 5,5              
mesh_pps: 2,2
fade_start: 1.0
fade_end: 10.0
fade_target: 0
zero_reference_position: 153, 125

########################################
# SCREW TILT
########################################
[screws_tilt_adjust]
screw1: 72.7, 45
screw1_name: Frente-Esquerda
screw2: 242.7, 45
screw2_name: Frente-Direita
screw3: 72.7, 215
screw3_name: Trás-Esquerda
screw4: 242.7, 215
screw4_name: Trás-Direita
speed: 150
horizontal_move_z: 8
screw_thread: CW-M4

[gcode_macro SCREWS_CALCULATE]
gcode:
    SCREWS_TILT_CALCULATE

########################################
# ADXL + INPUT SHAPER
########################################
[adxl345]
cs_pin: PB12
spi_bus: spi2

[resonance_tester]
accel_chip: adxl345
probe_points:
    117, 117, 50

[input_shaper]
# valores salvos automaticamente abaixo

########################################
# FANS
########################################
[fan]
pin: FAN0

[heater_fan ventoinha_hotend]
pin: FAN1
max_power: 1.0
shutdown_speed: 0.0
heater: extruder
heater_temp: 50.0

########################################
# VIRTUAL SD
########################################
[virtual_sdcard]
path: /home/biqu/printer_Ender3_data/gcodes

[display_status]
[pause_resume]


